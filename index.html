<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>brandyslime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0e08; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const T = 16, SCALE = 3;
const MAP_W = 18, MAP_H = 16;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = MAP_W * T * SCALE;
canvas.height = MAP_H * T * SCALE;
ctx.scale(SCALE, SCALE);
ctx.imageSmoothingEnabled = false;

// --- Assets ---
const imgs = {};
let loaded = 0;
const SRCS = {
  fw:   'assets/TopDownHouse_FloorsAndWalls.png',
  f1:   'assets/TopDownHouse_FurnitureState1.png',
  dw:   'assets/TopDownHouse_DoorsAndWindows.png',
  si:   'assets/TopDownHouse_SmallItems.png',
  char: 'assets/ninja_blue.png',
  sam:  'assets/waiter.png',
};
for (const [key, src] of Object.entries(SRCS)) {
  const img = new Image();
  img.onload = () => { if (++loaded === Object.keys(SRCS).length) init(); };
  img.src = src;
  imgs[key] = img;
}

function blit(sheet, sc, sr, dx, dy) {
  ctx.drawImage(imgs[sheet], sc*T, sr*T, T, T, Math.floor(dx), Math.floor(dy), T, T);
}

// --- Map layers ---
// ground[y][x] = [sheet, col, row]
// decor[y][x]  = [sheet, col, row] — drawn above floor, below player (y-sorted)
// solidMap[y][x] = bool
const ground   = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));
const decor    = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));
const solidMap = Array.from({length: MAP_H}, () => Array(MAP_W).fill(false));

const FL = ['fw', 14, 6]; // orange checker floor
const WL = null;           // walls = dark background (no tile drawn)

function solidAt(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return true;
  return solidMap[y][x];
}

// Place a multi-tile sprite from tileset onto the decor + solid layers
// Tiles are drawn individually per-cell (no single drawImage call needed)
function place(wx, wy, sheet, sc, sr, w, h, isSolid = true) {
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      const gx = wx + dx, gy = wy + dy;
      if (gx < 0 || gy < 0 || gx >= MAP_W || gy >= MAP_H) continue;
      decor[gy][gx] = [sheet, sc + dx, sr + dy];
      if (isSolid) solidMap[gy][gx] = true;
    }
  }
}

function buildRoom() {
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      ground[y][x] = (y === 0 || y === MAP_H-1 || x === 0 || x === MAP_W-1) ? WL : FL;

  // Single table in the center: f1 (5,2)-(6,3) = 2×2
  // Top row is a thin shadow edge — not solid. Bottom row is the table body — solid.
  const tx = Math.floor(MAP_W/2) - 1, ty = Math.floor(MAP_H/2) - 1;
  place(tx, ty,     'f1', 5, 2, 2, 1, false);
  place(tx, ty + 1, 'f1', 5, 3, 2, 1, true);

  // Solid border
  for (let y = 0; y < MAP_H; y++) { solidMap[y][0] = true; solidMap[y][MAP_W-1] = true; }
  for (let x = 0; x < MAP_W; x++) { solidMap[0][x] = true; solidMap[MAP_H-1][x] = true; }

}

// --- Player ---
const MOVE_SPEED = 1; // px per frame; T=16 so each tile takes 16 frames
const player = {
  gx: 9, gy: 12,
  x: 9 * T + 8, y: 12 * T + 8,
  tx: 9 * T + 8, ty: 12 * T + 8,
  dir: 0, frame: 0, frameTimer: 0, moving: false,
};
const WALK_FRAMES = 4, FRAME_TICKS = 4;

function drawPlayer(sx, sy) {
  const col = player.dir;
  const row = player.moving ? player.frame % WALK_FRAMES : 0;
  ctx.drawImage(imgs['char'], col*T, row*T, T, T,
    Math.floor(sx - T/2), Math.floor(sy - T/2), T, T);
}

// --- Waiter ---
const WAITER_SPEED = 0.5; // px/frame → 32 frames per tile, no pause between tiles
const waiter = {
  gx: 2, gy: 2,
  x: 2 * T + 8, y: 2 * T + 8,
  tx: 2 * T + 8, ty: 2 * T + 8,
  dir: 0, frame: 0, frameTimer: 0, moving: false,
};

function drawWaiter(sx, sy) {
  const col = waiter.dir;
  const row = waiter.moving ? waiter.frame % WALK_FRAMES : 0;
  ctx.drawImage(imgs['sam'], col*T, row*T, T, T,
    Math.floor(sx - T/2), Math.floor(sy - T/2), T, T);
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => {
  if (gameOver) { resetGame(); return; }
  overlay = false; startAudio();
});

// --- Audio ---
// Pre-fetch the raw bytes early; stored so we don't re-download on retry.
// If it fails we re-fetch on demand.
let cachedAB = null;
fetch('assets/beat210mrgirlfriend_2.mp3')
  .then(r => r.arrayBuffer())
  .then(ab => { cachedAB = ab; })
  .catch(() => {});

let audioReady = false;
function startAudio() {
  if (audioReady) return;

  const ac = new AudioContext();
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.55, ac.currentTime + 3);
  gain.connect(ac.destination);

  const getAB = cachedAB
    ? Promise.resolve(cachedAB.slice(0))
    : fetch('assets/beat210mrgirlfriend_2.mp3').then(r => r.arrayBuffer());

  ac.resume()
    .then(() => getAB)
    .then(ab => ac.decodeAudioData(ab))
    .then(buf => {
      const src = ac.createBufferSource();
      src.buffer = buf; src.loop = true;
      src.connect(gain); src.start();
      audioReady = true;
    })
    .catch(() => {});
}


// --- Game over ---
let gameOver = false;

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, MAP_W * T, MAP_H * T);

  const bw = 250, bh = 90;
  const bx = Math.floor((MAP_W * T - bw) / 2);
  const by = Math.floor((MAP_H * T - bh) / 2);
  const c = 5;

  ctx.fillStyle = '#1e1008';
  ctx.strokeStyle = '#c8943a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + c, by);      ctx.lineTo(bx + bw - c, by);
  ctx.lineTo(bx + bw, by + c); ctx.lineTo(bx + bw, by + bh - c);
  ctx.lineTo(bx + bw - c, by + bh); ctx.lineTo(bx + c, by + bh);
  ctx.lineTo(bx, by + bh - c); ctx.lineTo(bx, by + c);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  const cx = MAP_W * T / 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0d070';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText("You've been", cx, by + 20);
  ctx.fillText('served!', cx, by + 34);
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '5px "Press Start 2P"';
  ctx.fillText('click to try again', cx, by + 60);
}

function resetGame() {
  player.gx = 9; player.gy = 12;
  player.x = player.tx = 9 * T + 8;
  player.y = player.ty = 12 * T + 8;
  player.dir = 0; player.frame = 0; player.frameTimer = 0; player.moving = false;

  waiter.gx = 2; waiter.gy = 2;
  waiter.x = waiter.tx = 2 * T + 8;
  waiter.y = waiter.ty = 2 * T + 8;
  waiter.dir = 0; waiter.frame = 0; waiter.frameTimer = 0; waiter.moving = false;

  gameOver = false;
}

// --- Overlay ---
let overlay = true;

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, MAP_W * T, MAP_H * T);

  const bw = 250, bh = 80;
  const bx = Math.floor((MAP_W * T - bw) / 2);
  const by = Math.floor((MAP_H * T - bh) / 2);
  const c = 5;

  ctx.fillStyle = '#1e1008';
  ctx.strokeStyle = '#c8943a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + c, by);
  ctx.lineTo(bx + bw - c, by);
  ctx.lineTo(bx + bw, by + c);
  ctx.lineTo(bx + bw, by + bh - c);
  ctx.lineTo(bx + bw - c, by + bh);
  ctx.lineTo(bx + c, by + bh);
  ctx.lineTo(bx, by + bh - c);
  ctx.lineTo(bx, by + c);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  const cx = MAP_W * T / 2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0d070';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('Welcome to the', cx, by + 22);
  ctx.fillText('Brandywine Diner!', cx, by + 36);
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '5px "Press Start 2P"';
  ctx.fillText('click to begin...', cx, by + 60);
}

// --- Game loop ---
function loop() {
  if (!overlay && !gameOver) {
    // Waiter AI: pick next tile immediately upon arrival (no inter-tile pause)
    if (!waiter.moving) {
      const wdx = player.gx - waiter.gx, wdy = player.gy - waiter.gy;
      let moved = false;
      const attempt = (ddx, ddy, dir) => {
        if (moved) return;
        const ngx = waiter.gx + ddx, ngy = waiter.gy + ddy;
        if (!solidAt(ngx, ngy)) {
          waiter.gx = ngx; waiter.gy = ngy;
          waiter.tx = ngx * T + T / 2; waiter.ty = ngy * T + T / 2;
          waiter.dir = dir; waiter.moving = true; moved = true;
        }
      };
      if (Math.abs(wdx) >= Math.abs(wdy)) {
        if (wdx > 0) attempt(1, 0, 3); else if (wdx < 0) attempt(-1, 0, 2);
        if (wdy > 0) attempt(0, 1, 0); else if (wdy < 0) attempt(0, -1, 1);
      } else {
        if (wdy > 0) attempt(0, 1, 0); else if (wdy < 0) attempt(0, -1, 1);
        if (wdx > 0) attempt(1, 0, 3); else if (wdx < 0) attempt(-1, 0, 2);
      }
    } else {
      const sx = Math.sign(waiter.tx - waiter.x) * Math.min(WAITER_SPEED, Math.abs(waiter.tx - waiter.x));
      const sy = Math.sign(waiter.ty - waiter.y) * Math.min(WAITER_SPEED, Math.abs(waiter.ty - waiter.y));
      waiter.x += sx; waiter.y += sy;
      if (waiter.x === waiter.tx && waiter.y === waiter.ty) waiter.moving = false;
      if (++waiter.frameTimer >= FRAME_TICKS) { waiter.frame++; waiter.frameTimer = 0; }
    }

    if (waiter.gx === player.gx && waiter.gy === player.gy) gameOver = true;
  }

  if (!overlay && !gameOver && !player.moving) {
    let ddx = 0, ddy = 0;
    if      (keys['ArrowUp']    || keys['w'] || keys['W']) { ddy = -1; player.dir = 1; }
    else if (keys['ArrowDown']  || keys['s'] || keys['S']) { ddy =  1; player.dir = 0; }
    else if (keys['ArrowLeft']  || keys['a'] || keys['A']) { ddx = -1; player.dir = 2; }
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) { ddx =  1; player.dir = 3; }
    if (ddx || ddy) {
      const ngx = player.gx + ddx, ngy = player.gy + ddy;
      if (!solidAt(ngx, ngy)) {
        player.gx = ngx; player.gy = ngy;
        player.tx = ngx * T + T / 2;
        player.ty = ngy * T + T / 2;
        player.moving = true;
      }
    }
  }

  // Animate toward target tile
  if (player.moving) {
    const stepX = Math.sign(player.tx - player.x) * Math.min(MOVE_SPEED, Math.abs(player.tx - player.x));
    const stepY = Math.sign(player.ty - player.y) * Math.min(MOVE_SPEED, Math.abs(player.ty - player.y));
    player.x += stepX; player.y += stepY;
    if (player.x === player.tx && player.y === player.ty) player.moving = false;
    if (++player.frameTimer >= FRAME_TICKS) { player.frame++; player.frameTimer = 0; }
  } else {
    player.frame = 0; player.frameTimer = 0;
  }

  ctx.clearRect(0, 0, MAP_W * T, MAP_H * T);

  // Draw ground layer
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++) {
      const g = ground[y][x];
      if (g) blit(g[0], g[1], g[2], x*T, y*T);
    }

  // Build y-sorted draw list: decor objects + player
  const drawList = [];
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++) {
      const d = decor[y][x];
      if (d) drawList.push({ type: 'tile', x, y, d });
    }
  drawList.push({ type: 'player' });
  drawList.push({ type: 'waiter' });
  drawList.sort((a, b) => {
    const ay = a.type === 'player' ? player.y : a.type === 'waiter' ? waiter.y : (a.y + 1) * T;
    const by = b.type === 'player' ? player.y : b.type === 'waiter' ? waiter.y : (b.y + 1) * T;
    return ay - by;
  });

  for (const item of drawList) {
    if (item.type === 'player') drawPlayer(player.x, player.y);
    else if (item.type === 'waiter') drawWaiter(waiter.x, waiter.y);
    else blit(item.d[0], item.d[1], item.d[2], item.x * T, item.y * T);
  }

  if (overlay) drawOverlay();
  if (gameOver) drawGameOver();

  requestAnimationFrame(loop);
}

function init() {
  buildRoom();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>brandyslime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0e08; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const T = 16, SCALE = 3;
const MAP_W = 18, MAP_H = 16;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = MAP_W * T * SCALE;
canvas.height = MAP_H * T * SCALE;
ctx.scale(SCALE, SCALE);
ctx.imageSmoothingEnabled = false;

// --- Assets ---
const imgs = {};
let loaded = 0;
const SRCS = {
  fw:   'assets/TopDownHouse_FloorsAndWalls.png',
  f1:   'assets/TopDownHouse_FurnitureState1.png',
  dw:   'assets/TopDownHouse_DoorsAndWindows.png',
  si:   'assets/TopDownHouse_SmallItems.png',
  char: 'assets/ninja_blue.png',
};
for (const [key, src] of Object.entries(SRCS)) {
  const img = new Image();
  img.onload = () => { if (++loaded === Object.keys(SRCS).length) init(); };
  img.src = src;
  imgs[key] = img;
}

function blit(sheet, sc, sr, dx, dy) {
  ctx.drawImage(imgs[sheet], sc*T, sr*T, T, T, Math.floor(dx), Math.floor(dy), T, T);
}

// --- Map layers ---
// ground[y][x] = [sheet, col, row]
// decor[y][x]  = [sheet, col, row] — drawn above floor, below player (y-sorted)
// solidMap[y][x] = bool
const ground   = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));
const decor    = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));
const solidMap = Array.from({length: MAP_H}, () => Array(MAP_W).fill(false));

const FL = ['fw', 14, 6]; // orange checker floor
const WL = null;           // walls = dark background (no tile drawn)

function solidAt(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return true;
  return solidMap[y][x];
}

// Place a multi-tile sprite from tileset onto the decor + solid layers
// Tiles are drawn individually per-cell (no single drawImage call needed)
function place(wx, wy, sheet, sc, sr, w, h, isSolid = true) {
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      const gx = wx + dx, gy = wy + dy;
      if (gx < 0 || gy < 0 || gx >= MAP_W || gy >= MAP_H) continue;
      decor[gy][gx] = [sheet, sc + dx, sr + dy];
      if (isSolid) solidMap[gy][gx] = true;
    }
  }
}

function buildRoom() {
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++)
      ground[y][x] = (y === 0 || y === MAP_H-1 || x === 0 || x === MAP_W-1) ? WL : FL;

  // Single table in the center: f1 (5,2)-(6,3) = 2×2
  // Top row is a thin shadow edge — not solid. Bottom row is the table body — solid.
  const tx = Math.floor(MAP_W/2) - 1, ty = Math.floor(MAP_H/2) - 1;
  place(tx, ty,     'f1', 5, 2, 2, 1, false);
  place(tx, ty + 1, 'f1', 5, 3, 2, 1, true);

  // Solid border
  for (let y = 0; y < MAP_H; y++) { solidMap[y][0] = true; solidMap[y][MAP_W-1] = true; }
  for (let x = 0; x < MAP_W; x++) { solidMap[0][x] = true; solidMap[MAP_H-1][x] = true; }

}

// --- Player ---
const player = {
  x: 9 * T + 8, y: 12 * T + 8,
  dir: 0, frame: 0, frameTimer: 0, moving: false, speed: 1.5,
};
const WALK_FRAMES = 4, FRAME_TICKS = 8;

function drawPlayer(sx, sy) {
  const col = player.dir;
  const row = player.moving ? player.frame % WALK_FRAMES : 0;
  ctx.drawImage(imgs['char'], col*T, row*T, T, T,
    Math.floor(sx - T/2), Math.floor(sy - T/2), T, T);
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => { overlay = false; startAudio(); });

// --- Audio ---
// Pre-fetch the raw bytes early; stored so we don't re-download on retry.
// If it fails we re-fetch on demand.
let cachedAB = null;
fetch('assets/beat210mrgirlfriend.mp3')
  .then(r => r.arrayBuffer())
  .then(ab => { cachedAB = ab; })
  .catch(() => {});

let audioReady = false;
function startAudio() {
  if (audioReady) return;

  const ac = new AudioContext();
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.55, ac.currentTime + 3);
  gain.connect(ac.destination);

  const getAB = cachedAB
    ? Promise.resolve(cachedAB.slice(0))
    : fetch('assets/beat210mrgirlfriend.mp3').then(r => r.arrayBuffer());

  ac.resume()
    .then(() => getAB)
    .then(ab => ac.decodeAudioData(ab))
    .then(buf => {
      const src = ac.createBufferSource();
      src.buffer = buf; src.loop = true;
      src.connect(gain); src.start();
      audioReady = true;
    })
    .catch(() => {});
}

// --- Collision ---
function tryMove(dx, dy) {
  const hw = 5, hh = 5;
  const nx = player.x + dx, ny = player.y + dy;
  const corners = [[nx-hw,ny-hh],[nx+hw,ny-hh],[nx-hw,ny+hh],[nx+hw,ny+hh]];
  if (!corners.some(([cx,cy]) => solidAt(Math.floor(cx/T), Math.floor(cy/T)))) {
    player.x = nx; player.y = ny; return;
  }
  // Slide x
  const cx2 = [[nx-hw,player.y-hh],[nx+hw,player.y-hh],[nx-hw,player.y+hh],[nx+hw,player.y+hh]];
  if (!cx2.some(([cx,cy]) => solidAt(Math.floor(cx/T), Math.floor(cy/T)))) { player.x = nx; return; }
  // Slide y
  const cy2 = [[player.x-hw,ny-hh],[player.x+hw,ny-hh],[player.x-hw,ny+hh],[player.x+hw,ny+hh]];
  if (!cy2.some(([cx,cy]) => solidAt(Math.floor(cx/T), Math.floor(cy/T)))) { player.y = ny; }
}

// --- Overlay ---
let overlay = true;

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, MAP_W * T, MAP_H * T);

  const bw = 250, bh = 80;
  const bx = Math.floor((MAP_W * T - bw) / 2);
  const by = Math.floor((MAP_H * T - bh) / 2);
  const c = 5;

  ctx.fillStyle = '#1e1008';
  ctx.strokeStyle = '#c8943a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + c, by);
  ctx.lineTo(bx + bw - c, by);
  ctx.lineTo(bx + bw, by + c);
  ctx.lineTo(bx + bw, by + bh - c);
  ctx.lineTo(bx + bw - c, by + bh);
  ctx.lineTo(bx + c, by + bh);
  ctx.lineTo(bx, by + bh - c);
  ctx.lineTo(bx, by + c);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  const cx = MAP_W * T / 2;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0d070';
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('Welcome to the', cx, by + 22);
  ctx.fillText('Brandywine Diner!', cx, by + 36);
  ctx.fillStyle = '#8a7a5a';
  ctx.font = '5px "Press Start 2P"';
  ctx.fillText('click to begin...', cx, by + 60);
}

// --- Game loop ---
function loop() {
  let dx = 0, dy = 0;
  if (!overlay) {
    if (keys['ArrowUp']    || keys['w'] || keys['W']) { dy = -player.speed; player.dir = 1; }
    if (keys['ArrowDown']  || keys['s'] || keys['S']) { dy =  player.speed; player.dir = 0; }
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx = -player.speed; player.dir = 2; }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx =  player.speed; player.dir = 3; }
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  }

  player.moving = !!(dx || dy);
  if (player.moving) {
    tryMove(dx, dy);
    if (++player.frameTimer >= FRAME_TICKS) { player.frame++; player.frameTimer = 0; }
  } else {
    player.frame = 0; player.frameTimer = 0;
  }

  ctx.clearRect(0, 0, MAP_W * T, MAP_H * T);

  // Draw ground layer
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++) {
      const g = ground[y][x];
      if (g) blit(g[0], g[1], g[2], x*T, y*T);
    }

  // Build y-sorted draw list: decor objects + player
  const drawList = [];
  for (let y = 0; y < MAP_H; y++)
    for (let x = 0; x < MAP_W; x++) {
      const d = decor[y][x];
      if (d) drawList.push({ type: 'tile', x, y, d });
    }
  drawList.push({ type: 'player' });
  drawList.sort((a, b) => {
    const ay = a.type === 'player' ? player.y : (a.y + 1) * T;
    const by = b.type === 'player' ? player.y : (b.y + 1) * T;
    return ay - by;
  });

  for (const item of drawList) {
    if (item.type === 'player') {
      drawPlayer(player.x, player.y);
    } else {
      blit(item.d[0], item.d[1], item.d[2], item.x * T, item.y * T);
    }
  }

  if (overlay) drawOverlay();

  requestAnimationFrame(loop);
}

function init() {
  buildRoom();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>

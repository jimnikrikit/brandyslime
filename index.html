<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>brandyslime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const T = 16;       // tile size in source pixels
const SCALE = 3;
const VIEW_W = 20;  // tiles visible
const VIEW_H = 14;
const MAP_W  = 42;
const MAP_H  = 28;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = VIEW_W * T * SCALE;
canvas.height = VIEW_H * T * SCALE;
ctx.scale(SCALE, SCALE);
ctx.imageSmoothingEnabled = false;

// --- Load assets ---
const imgs = {};
let loaded = 0;
function loadImg(key, src) {
  const img = new Image();
  img.onload = () => { imgs[key] = img; loaded++; if (loaded === 3) init(); };
  img.src = src;
}
loadImg('floor',   'assets/tileset_floor.png');
loadImg('village', 'assets/tileset_village_abandoned.png');
loadImg('char',    'assets/ninja_blue.png');

// --- Tile helpers ---
// tile(sheet, col, row) → draws one tile at canvas position (dx,dy)
function blit(sheet, sc, sr, dx, dy) {
  ctx.drawImage(imgs[sheet], sc*T, sr*T, T, T, dx, dy, T, T);
}

// --- Map layers ---
// groundLayer[y][x] = [sheet, col, row]
// objLayer[y][x]    = [sheet, col, row, solid] or null
const groundLayer = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));
const objLayer    = Array.from({length: MAP_H}, () => Array(MAP_W).fill(null));

// Ground tile variants for texture
const GRASS_TILES = [[6,8],[6,9],[6,7],[16,8],[16,9]];
function grassAt(x, y) {
  const v = ((x * 7 + y * 13) ^ (x * 3)) & 0xff;
  // 80% plain, 20% variants
  return v < 200 ? GRASS_TILES[0] : GRASS_TILES[1 + (v % 4)];
}

function buildGround() {
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const [gc, gr] = grassAt(x, y);
      groundLayer[y][x] = ['floor', gc, gr];
    }
  }
  // Horizontal dirt path rows 13-14
  for (let y = 13; y <= 14; y++)
    for (let x = 0; x < MAP_W; x++)
      groundLayer[y][x] = ['floor', 3, 8];
  // Vertical connecting paths (under each house door)
  const doorCols = [8, 21, 34]; // center col of each house door
  for (const cx of doorCols)
    for (let y = 8; y <= 12; y++)
      groundLayer[y][cx] = ['floor', 3, 8];
}

// Place a large house (5 wide × 4 tall) — tileset cols 11-15, rows 7-10
// Door at center col (hx+2), walkable row (hy+3), rest solid
function placeLargeHouse(hx, hy) {
  const COLS = 5, ROWS = 4;
  const SRC_COL = 11, SRC_ROW = 7;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const solid = r < 3; // bottom row is decorative face, not solid
      objLayer[hy + r][hx + c] = ['village', SRC_COL + c, SRC_ROW + r, solid];
    }
  }
}

// Place a small house (4 wide × 3 tall) — tileset cols 16-19, rows 7-9
// Bottom row is walkable face
function placeSmallHouse(hx, hy) {
  const COLS = 4, ROWS = 3;
  const SRC_COL = 16, SRC_ROW = 7;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const solid = r < 2;
      objLayer[hy + r][hx + c] = ['village', SRC_COL + c, SRC_ROW + r, solid];
    }
  }
}

// Place a big tree (3 wide × 3 tall) — tileset cols 1-3, rows 6-8
function placeTree(tx, ty) {
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < 3; c++)
      objLayer[ty + r][tx + c] = ['village', 1 + c, 6 + r, true];
}

function buildObjects() {
  // Three large houses across the top
  placeLargeHouse(4,  3);   // house A, door at col 6
  placeLargeHouse(17, 3);   // house B, door at col 19
  placeLargeHouse(30, 3);   // house C, door at col 32

  // Small house variation tucked to right side
  placeSmallHouse(37, 5);

  // Trees along top border
  for (let x = 0; x < MAP_W - 2; x += 4) placeTree(x, 0);
  // Trees left border
  for (let y = 3; y < MAP_H - 3; y += 4) placeTree(0, y);
  // Trees right border (mind small house)
  for (let y = 10; y < MAP_H - 3; y += 4) placeTree(MAP_W - 3, y);
  // Trees bottom border
  for (let x = 3; x < MAP_W - 3; x += 4) placeTree(x, MAP_H - 3);
  // Scattered trees
  placeTree(12, 8);
  placeTree(26, 9);
  placeTree(14, 17);
  placeTree(27, 19);
  placeTree(5, 20);
}

// --- Solid tile check ---
function isSolid(wx, wy) {
  const tx = Math.floor(wx / T);
  const ty = Math.floor(wy / T);
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return true;
  const obj = objLayer[ty][tx];
  return obj && obj[3] === true;
}

// --- Player ---
const player = {
  x: 19 * T + 8,  // pixel position (center of tile)
  y: 17 * T + 8,
  dir: 0,         // 0=down,1=up,2=left,3=right
  frame: 0,
  frameTimer: 0,
  moving: false,
  speed: 1.5,
};

const WALK_FRAMES = 4;
const FRAME_TICKS = 8;

// Character sprite: col=direction, row=walk frame (0-3)
function drawPlayer(sx, sy) {
  const col = player.dir;    // direction column
  const row = player.moving ? player.frame % WALK_FRAMES : 0;
  ctx.drawImage(imgs['char'],
    col * T, row * T, T, T,
    Math.floor(sx - T/2), Math.floor(sy - T/2), T, T);
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))
    e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

function tryMove(dx, dy) {
  const hw = 5, hh = 5;
  const nx = player.x + dx, ny = player.y + dy;
  const corners = [
    [nx-hw, ny-hh], [nx+hw, ny-hh],
    [nx-hw, ny+hh], [nx+hw, ny+hh],
  ];
  if (!corners.some(([cx, cy]) => isSolid(cx, cy))) {
    player.x = nx; player.y = ny; return true;
  }
  // Try sliding
  const cx2 = [[nx-hw, player.y-hh],[nx+hw, player.y-hh],[nx-hw, player.y+hh],[nx+hw, player.y+hh]];
  if (!cx2.some(([cx,cy]) => isSolid(cx,cy))) { player.x = nx; return true; }
  const cy2 = [[player.x-hw, ny-hh],[player.x+hw, ny-hh],[player.x-hw, ny+hh],[player.x+hw, ny+hh]];
  if (!cy2.some(([cx,cy]) => isSolid(cx,cy))) { player.y = ny; return true; }
  return false;
}

// --- Camera ---
function getCam() {
  const vw = VIEW_W * T, vh = VIEW_H * T;
  return {
    x: Math.max(0, Math.min(MAP_W * T - vw, player.x - vw / 2)),
    y: Math.max(0, Math.min(MAP_H * T - vh, player.y - vh / 2)),
  };
}

// --- Main loop ---
function loop() {
  let dx = 0, dy = 0;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) { dy = -player.speed; player.dir = 1; }
  if (keys['ArrowDown']  || keys['s'] || keys['S']) { dy =  player.speed; player.dir = 0; }
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) { dx = -player.speed; player.dir = 2; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx =  player.speed; player.dir = 3; }
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  player.moving = !!(dx || dy);
  if (player.moving) {
    tryMove(dx, dy);
    if (++player.frameTimer >= FRAME_TICKS) { player.frame++; player.frameTimer = 0; }
  } else {
    player.frame = 0; player.frameTimer = 0;
  }

  const cam = getCam();
  const ox = -cam.x, oy = -cam.y; // world-to-screen offset

  ctx.clearRect(0, 0, VIEW_W * T, VIEW_H * T);

  // Visible tile range
  const tx0 = Math.floor(cam.x / T), ty0 = Math.floor(cam.y / T);
  const tx1 = Math.min(MAP_W, tx0 + VIEW_W + 2);
  const ty1 = Math.min(MAP_H, ty0 + VIEW_H + 2);

  // Draw ground layer
  for (let ty = ty0; ty < ty1; ty++)
    for (let tx = tx0; tx < tx1; tx++) {
      const g = groundLayer[ty][tx];
      if (g) blit(g[0], g[1], g[2], tx*T + ox, ty*T + oy);
    }

  // Draw objects and player in Y-sorted order
  // Collect visible objects + player into sorted draw list
  const drawList = [];
  for (let ty = ty0; ty < ty1; ty++)
    for (let tx = tx0; tx < tx1; tx++) {
      const o = objLayer[ty][tx];
      if (o) drawList.push({ type: 'tile', tx, ty, o });
    }
  drawList.push({ type: 'player' });
  drawList.sort((a, b) => {
    const ay = a.type === 'player' ? player.y : (a.ty + 1) * T;
    const by = b.type === 'player' ? player.y : (b.ty + 1) * T;
    return ay - by;
  });

  for (const item of drawList) {
    if (item.type === 'player') {
      drawPlayer(player.x + ox, player.y + oy);
    } else {
      const { tx, ty, o } = item;
      blit(o[0], o[1], o[2], tx*T + ox, ty*T + oy);
    }
  }

  requestAnimationFrame(loop);
}

function init() {
  buildGround();
  buildObjects();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
